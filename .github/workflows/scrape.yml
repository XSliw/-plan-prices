name: Price Parser

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run parser
        run: python scraper.py

      - name: Commit prices.json
        run: |
          git config user.name  "prices-bot"
          git config user.email "prices-bot@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "Обновление цен"
          git push

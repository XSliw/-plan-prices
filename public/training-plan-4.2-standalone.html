<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17191c"><title>Тренировочный план 4.2</title>
<style>

lign-items:center;justify-content:center}.week small{font-size:9px}.week.current{outline:2px solid var(--accent);color:var(--text)}.week.complete{background:#273440;color:var(--accent)}.bars{height:190px;display:flex;align-items:end;gap:8px;overflow:auto}.bar{height:100%;min-width:35px;flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}.track{width:100%;flex:1;background:var(--soft);border-radius:7px;display:flex;align-items:end;overflow:hidden}.track i{display:block;width:100%;min-height:4px;background:var(--accent)}.bar small{color:var(--muted);font-size:10px}.nav{position:fixed;bottom:0;left:50%;translate:-50%;width:min(100%,720px);height:76px;padding:7px 5px calc(7px + env(safe-area-inset-bottom));display:flex;background:rgba(19,21,24,.96);border-top:1px solid var(--line);backdrop-filter:blur(12px)}.nav button{min-width:0;flex:1;border:0;background:transparent;color:var(--muted);font-size:10px}.nav button.active{background:var(--soft);color:var(--accent)}.toolbar{display:flex;gap:8px;overflow:auto}.chip{padding:9px 12px;white-space:nowrap;color:var(--muted)}.chip.active{border-color:var(--accent);color:var(--text)}input{width:100%;min-height:48px;padding:10px 14px;border:1px solid var(--line);border-radius:13px;background:var(--soft);color:var(--text)}.week-panel{border:1px solid var(--line);border-radius:18px;background:var(--card);overflow:hidden}.toggle{width:100%;padding:15px;border:0;border-radius:0;background:transparent;display:flex;justify-content:space-between;text-align:left}.days{padding:0 10px 10px;display:flex;flex-direction:column;gap:8px}.day{overflow:hidden}.day summary{cursor:pointer;padding:14px;list-style:none;display:flex;gap:10px;justify-content:space-between}.day summary::-webkit-details-marker{display:none}.tag{font-size:10px;text-transform:uppercase;color:var(--accent)}.day-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:12px}.info{padding:12px;background:var(--soft);border-radius:12px}.info strong{display:block;margin-bottom:4px}.block{padding:14px;border:1px solid var(--line);border-radius:14px}.block ol{padding-left:20px;margin:9px 0}.block li+li{margin-top:7px}.done{min-height:44px;padding:9px 12px}.done.active{background:#273440;border-color:var(--accent);color:var(--accent)}.glossary{display:grid;gap:9px}.glossary div{padding:12px;background:var(--soft);border-radius:12px}.hidden{display:none!important}@media(max-width:350px){.app{padding-inline:10px}.ring{flex-basis:88px}.weeks{grid-template-columns:repeat(5,1fr)}.hero{padding:15px}h1{font-size:23px}}
</style></head><body><main class="app"><div id="view"></div></main><nav class="nav" aria-label="Основная навигация"><button data-tab="overview">Обзор</button><button data-tab="today">Сегодня</button><button data-tab="weeks">Недели</button><button data-tab="months">Месяцы</button><button data-tab="goals">Цели</button></nav>
<script>
(()=>{'use strict';
const START=new Date(2026,6,13),NAMES=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'],KM=[0,0,0,0,0,0,0,18,22,26,22,32,36,40,32,40,44,48,38,46,50,54,42,50,54,58,46,54,58,62,50,36,16],CONTACTS=[0,0,0,0,0,0,0,3,3,4,3,4,4,5,4,5,5,5,4,5,5,5,4,5,5,5,4,5,5,5,4,4,2],KEY='training-plan-v4-progress';
const B=(title,time,steps,rest)=>({title,time,steps,rest}),warm=t=>t==='run'?B('Разминка перед бегом','12–15 мин',['5 минут быстрой ходьбы, затем 5 минут очень лёгкого бега.','Круги голеностопом и тазом — по 10 в каждую сторону.','Захлёст, высокое бедро, приставной шаг — по 2×20 м; отдых 30 секунд.','Перед быстрой работой: 3 ускорения по 60 м на 60%, 70% и 80%; обратно идти пешком.'],'Начать основной бег через 2 минуты.'):t==='upper'?B('Разминка верха','12 мин',['3 минуты спокойной ходьбы.','Круги кистями, локтями и плечами — по 15 в каждую сторону.','Лопаточные подтягивания — 2×8; отдых 45 секунд.','Лопаточные отжимания — 2×10; отдых 45 секунд.','Подтягивания 1×5 и брусья 1×8, очень легко.'],'Отдохнуть 2 минуты.'):B('Общая разминка','10 мин',['5 минут спокойной ходьбы.','Суставная гимнастика — по 10 движений.','Два лёгких пробных подхода первого упражнения.'],'Отдохнуть 90 секунд.'),cool=k=>B('Заминка','8–10 мин',[k==='run'?'5 минут перейти с бега на ходьбу.':'3 минуты спокойной ходьбы.','Растяжка груди, спины, икр и бёдер — по 30 секунд без боли.','Вдох 4 секунды, выдох 6 секунд — 2 минуты.','Записать последний RPE и реакцию суставов.'],'Тренировка завершена.');
function runDays(c){return c===2?[0,6]:c===3?[0,3,6]:c===4?[0,1,3,6]:c===5?[0,1,3,4,6]:[]}function dist(w,d){const shares={2:{0:.42,6:.58},3:{0:.30,3:.32,6:.38},4:{0:.25,1:.18,3:.25,6:.32},5:{0:.22,1:.15,3:.22,4:.16,6:.25}};return Math.max(3,Math.round(KM[w-1]*(shares[CONTACTS[w-1]]?.[d]||0)))}
function runs(w,d){if(!runDays(CONTACTS[w-1]).includes(d))return[];const km=dist(w,d);if(w<=9)return[warm('run'),B('Бег с ходьбой',km+' км',['Повторять: 2 минуты очень лёгкого бега и 1 минута шага.','RPE 2–3: можно говорить полными предложениями.','Продолжать до '+km+' км, не ускоряться в конце.'],'Сразу перейти к заминке.'),cool('run')];if(d===6)return[warm('run'),B('Длительный лёгкий бег',km+' км',['Первые 2 км — 5:15–5:35/км.','Основная часть — 4:55–5:30/км, RPE 3–4.','Последние 2 км не ускорять; вода каждые 25–30 минут.'],'Силовую и прыжки после бега не выполнять.'),cool('run')];if(d===3){const work=w<16?'3×6 минут по 3:48–3:55/км':w<21?'5×800 м по 2:48–2:52':w<26?'4×1 км по 3:28–3:35':w<31?'5×1 км по 3:20–3:27':'3×600 м в актуальном темпе 3 км';return[warm('run'),B('Ключевая беговая работа',km+' км всего',['Выполнить '+work+'.','Между отрезками 2:30–3:00 лёгкой трусцы.','Добрать легко до '+km+' км; последний отрезок не выше RPE 8.'],'Через 2 минуты ходьбы перейти к заминке.'),cool('run')]};return[warm('run'),B(d===0?'Лёгкий бег':'Восстановительный бег',km+' км',['Бежать '+km+' км в темпе '+(d===0?'4:45–5:30':'5:00–5:45')+'/км.','RPE 2–3, разговор свободный.','Если тяжело — замедлиться, ускорения не добавлять.'],'Через 2 минуты перейти к заминке.'),cool('run')]}
function strength(w,d){if(w>=5&&w<=7)return[];const del=w%4===3;if(d===0)return[warm('upper'),B('Подтягивания — объём','30 мин',[(del?4:6)+'×'+Math.min(12,6+Math.ceil(w/5))+' без веса; RIR 2–3.','Опускание 2 секунды; отдых между подходами 2:30.','При потере техники уменьшить следующий подход на 2 повтора.'],'Отдых 4 минуты.'),B('КСУ — техника','15 мин',[(del?3:5)+'×2–4 чистых цикла.','Внутри подхода 10–15 секунд в висе; между подходами 2 минуты.','Остановиться при первой потере ритма.'],'Отдых 4 минуты.'),B('Гиря — техника','12 мин',[(del?3:5)+'×3 рывка каждой рукой.','Между руками 60 секунд, между подходами 2 минуты.','24 кг только при чистой технике, иначе 16 кг.'],'Отдых 2 минуты.'),cool('strength')];if(d===1)return[warm('upper'),B('Мяч 5 кг — техника','30 мин',[(w<16?4:w<25?6:8)+' бросков вперёд и назад.','Усилие 70–85%; отдых 2:30–3:00 между попытками.','Завершить при падении дальности на 7–10%.'],'Отдых 5 минут.'),B('Плотность подтягиваний и брусьев','24 мин',['Подтягивания EMOM 10 минут: 4–7 повторов.','Отдых между упражнениями 4 минуты.','Брусья EMOM 10 минут: 8–14 повторов, RIR 3.'],'Отдых 3 минуты.'),cool('strength')];if(d===2)return[warm('upper'),B('Подтягивания +16 кг','25 мин',[del?'3×4':'4×4–8','Отдых 3 минуты, корпус не раскачивать.','Если нет 4 чистых повторов — вес 8–12 кг.'],'Отдых 5 минут.'),B('Брусья +16 кг','25 мин',[del?'3×6':'4×6–12','Отдых 3 минуты, комфортная глубина.','Если нет 6 чистых повторов — вес 8–12 кг.'],'Отдых 5 минут.'),B('КСУ — короткая техника','12 мин',[(del?3:4)+'×2–4 цикла; отдых 2 минуты.','Не выполнять максимум.'],'Отдых 2 минуты.'),cool('strength')];if(d===4)return[warm('upper'),B('Гиря — плотность','20 мин',['10 раундов: 30 секунд рывков, затем 60 секунд отдыха.','Менять руку каждый раунд.','При потере техники перейти на 16 кг.'],'Отдых 6 минут.'),B('Мяч 5 кг — мощность','25 мин',[(del?3:w<20?5:7)+' бросков вперёд и назад.','Усилие 85–95%; отдых 3–4 минуты.','Завершить при падении результата на 7–10%.'],'Отдых 3 минуты.'),cool('strength')];if(d===5)return[warm('run'),B('Челнок или скорость','25 мин',[w%2?'4×60 м, отдых 4 минуты; затем 4×10 м — 3 попытки.':'3×100 м на 90–95%, отдых 5 минут; затем 10×10 м — 2 попытки.','Начинать после полного восстановления дыхания.','Низкий центр тяжести и короткие первые шаги.'],'Отдых 6 минут.'),B('Связка спецкросса','25 мин',[w%2===0?'2 круга: 500 м + 10 отжиманий + 5 прыжков + 10 отжиманий + 5 прыжков.':'4 круга: 200 м легко + 10 отжиманий + 5 прыжков.','Между кругами 3–6 минут; RPE не выше 7.','Прыжки только после допуска колена.'],'Отдых 6 минут.'),B('КСУ — плотность','15 мин',[(del?3:5)+'×2–5 циклов; отдых 2:30.','Закончить за два повтора до отказа.'],'Отдых 2 минуты.'),cool('run')];return[]}
function recovery(w){if(w>=5&&w<=7)return[B('Послеоперационный режим','По назначению врача',['Только разрешённые врачом лекарства, бытовая активность и прогулка.','Не выполнять бег, висы, силовые, прыжки и задержку дыхания.','Отметить самочувствие.'],'Спортивная часть завершена.')];return[warm('general'),B('Мобильность и контроль','30 мин',['Голеностоп к стене — 2×10 на сторону; отдых 30 секунд.','Разгибание грудного отдела — 2×8; отдых 30 секунд.','Dead bug — 3×8 на сторону; отдых 60 секунд.','Изометрия квадрицепса — 3×20 секунд; без боли.'],'Отдых 2 минуты.'),B('Спокойная ходьба','30–45 мин',['Разговорный темп, RPE 2.','Не проверять колено скоростью или подъёмами.'],'2 минуты спокойного дыхания.')]}
function make(w,d){const date=new Date(START);date.setDate(START.getDate()+(w-1)*7+d);const r=runs(w,d),s=strength(w,d),blocks=[...r,...s];if(!blocks.length)blocks.push(...recovery(w));const both=r.length&&s.length,cat=w>=5&&w<=7?'восстановление':r.length?'бег':s.length?(d===5?'техника':'силовая'):'восстановление';return{id:`w${w}-d${d}`,date,w,d,name:NAMES[d],cat,title:w>=5&&w<=7?'Послеоперационный режим':both?'Бег + специальная работа':r.length?(d===6?'Длительный бег':'Беговая работа'):s.length?(s[1]?.title||'Силовая работа'):'Мобильность и ходьба',duration:both?'90–120 мин или два блока':r.length?(d===6?'70–130 мин':'45–90 мин'):s.length?'60–110 мин':'45–60 мин',goal:cat==='бег'?'Выполнить бег с заданной интенсивностью и чистой техникой.':cat==='силовая'?'Развить силу и выносливость с запасом.':cat==='техника'?'Повысить скорость и качество переходов.':'Поддержать восстановление без тяжёлой нагрузки.',order:both?'Сначала бег. Затем питание, вода и минимум 4–6 часов перерыва. Специальный блок вечером.':'Выполнять блоки строго сверху вниз.',blocks,finish:'Остановиться при острой боли, отёке, головокружении или ухудшении зрения. Пропущенный объём не переносить.'}}
const days=Array.from({length:33},(_,w)=>Array.from({length:7},(_,d)=>make(w+1,d))).flat();let done=new Set(JSON.parse(localStorage.getItem(KEY)||'[]')),tab='overview',selectedWeek=1,query='',filter='все';const view=document.querySelector('#view'),fmt=d=>new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'long'}).format(d),phase=w=>w<=7?'Подготовка и восстановление':w<=15?'Возврат к бегу':w<=27?'Основной блок':w<=31?'Специальная подготовка':'Подводка';
function idx(){const now=new Date(),i=days.findIndex(x=>x.date.toDateString()===now.toDateString());return i>=0?i:now<START?0:days.length-1}function save(){localStorage.setItem(KEY,JSON.stringify([...done]))}function dayHTML(x,open=false){return `<details class="day" ${open?'open':''}><summary><div><span class="tag">${x.cat}</span><h3>${x.name} · ${fmt(x.date)}</h3><span class="muted">${x.title} · ${x.duration}</span></div><span>${done.has(x.id)?'Готово':'Открыть'}</span></summary><div class="day-body"><div class="info"><strong>Цель</strong>${x.goal}</div><div class="info"><strong>Порядок</strong>${x.order}</div>${x.blocks.map((b,i)=>`<section class="block"><span class="tag">Шаг ${i+1} · ${b.time}</span><h3>${b.title}</h3><ol>${b.steps.map(s=>`<li>${s}</li>`).join('')}</ol><p class="muted"><strong>Переход:</strong> ${b.rest}</p></section>`).join('')}<div class="info"><strong>Когда остановиться</strong>${x.finish}</div><button class="done ${done.has(x.id)?'active':''}" data-done="${x.id}">${done.has(x.id)?'Отменить отметку':'Отметить тренировку выполненной'}</button></div></details>`}
function overview(){const i=idx(),cur=days[i],completed=done.size,pct=Math.round(completed/days.length*100),eligible=days.slice(0,i+1),missed=eligible.filter(x=>!done.has(x.id)).length,wc=Array.from({length:33},(_,n)=>days.filter(x=>x.w===n+1&&done.has(x.id)).length),months=[...new Set(days.map(x=>x.date.getFullYear()+'-'+x.date.getMonth()))].map(k=>{const [y,m]=k.split('-').map(Number);return{l:new Intl.DateTimeFormat('ru-RU',{month:'short'}).format(new Date(y,m,1)).replace('.',''),v:days.filter(x=>x.date.getFullYear()+'-'+x.date.getMonth()===k&&done.has(x.id)).length}}),max=Math.max(1,...months.map(x=>x.v));return `<div class="stack"><header class="hero"><div><p class="eyebrow">План подготовки 4.2</p><h1>Твой прогресс</h1><p class="muted">Неделя ${cur.w} из 33 · ${phase(cur.w)}</p></div><div class="ring" style="--p:${pct*3.6}deg"><strong>${pct}%</strong><small>выполнено</small></div></header><button class="primary" data-tab="today">Открыть тренировку на сегодня</button><section class="metrics"><article class="metric"><strong>${completed}</strong><span>дней выполнено</span></article><article class="metric"><strong>${missed}</strong><span>прошедших не отмечено</span></article><article class="metric"><strong>${wc[cur.w-1]} / 7</strong><span>текущая неделя</span></article><article class="metric"><strong>${days.length}</strong><span>дней в полном плане</span></article></section><section class="card"><div class="head"><div><p class="eyebrow">Календарь цикла</p><h2>33 недели</h2></div><span class="muted">${completed} отметок</span></div><div class="weeks">${wc.map((c,n)=>`<button class="week ${c===7?'complete':''} ${n+1===cur.w?'current':''}" data-week="${n+1}"><b>${n+1}</b><small>${c}/7</small></button>`).join('')}</div></section><section class="card"><div class="head"><div><p class="eyebrow">Ритм работы</p><h2>По месяцам</h2></div></div><div class="bars">${months.map(x=>`<div class="bar"><div class="track"><i style="height:${Math.max(3,x.v/max*100)}%"></i></div><b>${x.v}</b><small>${x.l}</small></div>`).join('')}</div></section></div>`}
function today(){const i=idx();return `<div class="stack"><header><p class="eyebrow">Текущий план</p><h1>Сегодня и завтра</h1></header>${dayHTML(days[i],true)}${days[i+1]?dayHTML(days[i+1]):''}</div>`}function weeks(){const grouped=Array.from({length:33},(_,n)=>days.filter(x=>x.w===n+1)),f=x=>(filter==='все'||x.cat===filter)&&(!query||JSON.stringify(x).toLowerCase().includes(query.toLowerCase()));return `<div class="stack"><header><p class="eyebrow">Полный календарь</p><h1>33 недели · 231 день</h1></header><input data-search placeholder="Поиск упражнения" value="${query.replaceAll('"','&quot;')}"><div class="toolbar">${['все','бег','силовая','техника','восстановление'].map(x=>`<button class="chip ${filter===x?'active':''}" data-filter="${x}">${x}</button>`).join('')}</div>${grouped.map((g,n)=>{const show=g.filter(f);if(!show.length)return'';return `<section class="week-panel"><button class="toggle" data-open-week="${n+1}"><span><b>Неделя ${n+1}</b><br><small class="muted">${phase(n+1)} · ${KM[n]} км</small></span><span>${g.filter(x=>done.has(x.id)).length}/7</span></button><div class="days ${selectedWeek===n+1?'':'hidden'}">${show.map(x=>dayHTML(x)).join('')}</div></section>`}).join('')}</div>`}function months(){const ms=[...new Set(days.map(x=>x.date.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})))];return `<div class="stack"><header><p class="eyebrow">Календарь</p><h1>Месяцы плана</h1></header>${ms.map(m=>{const a=days.filter(x=>x.date.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})===m);return `<section class="card"><div class="head"><h2>${m}</h2><b>${a.filter(x=>done.has(x.id)).length}/${a.length}</b></div><p class="muted">Недели ${a[0].w}–${a[a.length-1].w}</p></section>`}).join('')}</div>`}function goals(){return `<div class="stack"><header><p class="eyebrow">Ориентиры</p><h1>Цели и словарь</h1></header><section class="card glossary"><h2>Главные правила</h2><div>Не выполнять отказные подходы и не переносить пропущенный объём.</div><div>Боль, отёк, головокружение или ухудшение зрения — причина остановиться.</div></section><section class="card glossary"><h2>Термины</h2><div><b>RIR 2</b><br><span class="muted">Остановиться, когда осталось около двух чистых повторов.</span></div><div><b>RPE 7</b><br><span class="muted">Тяжело, но техника и дыхание контролируются.</span></div><div><b>EMOM</b><br><span class="muted">Повторы в начале минуты, остаток минуты — отдых.</span></div><div><b>Лёгкий бег</b><br><span class="muted">Темп, при котором можно говорить предложениями.</span></div></section></div>`}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));view.innerHTML=tab==='overview'?overview():tab==='today'?today():tab==='weeks'?weeks():tab==='months'?months():goals();scrollTo({top:0,behavior:'instant'})}document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.tab){tab=b.dataset.tab;render()}else if(b.dataset.week){selectedWeek=+b.dataset.week;tab='weeks';render()}else if(b.dataset.openWeek){selectedWeek=selectedWeek===+b.dataset.openWeek?0:+b.dataset.openWeek;render()}else if(b.dataset.filter){filter=b.dataset.filter;render()}else if(b.dataset.done){done.has(b.dataset.done)?done.delete(b.dataset.done):done.add(b.dataset.done);save();try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light')}catch{}render()}});document.addEventListener('input',e=>{if(e.target.matches('[data-search]')){query=e.target.value;const pos=e.target.selectionStart;render();const input=document.querySelector('[data-search]');input.focus();input.setSelectionRange(pos,pos)}});try{window.Telegram?.WebApp?.ready();window.Telegram?.WebApp?.expand()}catch{}render();
})();
</script></body></html>

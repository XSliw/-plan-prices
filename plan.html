<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>План подготовки 4.1</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
--background:#060709;
--foreground:#edeff1;
--card:#0f1113;
--primary:#85a9c8;
--primary-foreground:#050608;
--secondary:#1a1c1f;
--muted-foreground:#8f9297;
--accent:#7a8895;
--destructive:#cb6d67;
--border:#2a2d31;
--input:#1e2124;
--ring:#85a9c8;
--radius:.8rem;
--mono:ui-monospace,'SF Mono','Roboto Mono','Cascadia Mono',Consolas,monospace
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{color-scheme:dark}
body{margin:0;background:var(--background);color:var(--foreground);font:14px/1.5 -apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;padding-bottom:96px}
button{font:inherit;cursor:pointer}
.wrap{max-width:48rem;margin:0 auto;padding:20px 12px;display:flex;flex-direction:column;gap:20px}
.tab{display:none}
.tab.on{display:flex;flex-direction:column;gap:16px}
.overview-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border:1px solid var(--border);border-radius:calc(var(--radius)*1.7);background:var(--card);padding:20px}
.overview-hero>div:first-child{display:flex;flex-direction:column;gap:8px;min-width:0}
.overview-hero h1{margin:0;font-size:24px;line-height:1.2}
.eyebrow{margin:0;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary)}
.hero-sub{margin:0;font-size:13px;color:var(--muted-foreground)}
.progress-ring{width:96px;height:96px;flex:none;border-radius:999px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle,var(--card) 61%,transparent 63%),conic-gradient(var(--primary) var(--progress),var(--secondary) 0deg)}
.progress-ring strong{font-family:var(--mono);font-size:22px}
.progress-ring span{color:var(--muted-foreground);font-size:10px}
.cta{display:flex;justify-content:space-between;align-items:center;width:100%;min-height:56px;padding:0 16px;border:none;border-radius:12px;background:var(--primary);color:var(--primary-foreground);font-size:15px;font-weight:600}
.cta svg{transform:rotate(-90deg)}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.metric-grid article{min-height:128px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;gap:8px;border:1px solid var(--border);border-radius:calc(var(--radius)*1.7);background:var(--card);padding:16px}
.metric-grid svg{color:var(--muted-foreground)}
.metric-grid strong{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1.1}
.metric-grid strong small{font-size:15px;color:var(--muted-foreground)}
.metric-grid article>span{font-size:13px;line-height:1.35;color:var(--muted-foreground)}
.dashboard-card{display:flex;flex-direction:column;gap:14px;border:1px solid var(--border);border-radius:calc(var(--radius)*1.7);background:var(--card);padding:16px}
.dashboard-heading{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.dashboard-heading>div{display:flex;flex-direction:column;gap:4px;min-width:0}
.dashboard-heading h2{margin:0;font-size:18px;line-height:1.2}
.dashboard-heading>span{font-family:var(--mono);font-size:12px;color:var(--muted-foreground);flex:none}
.week-matrix{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
.week-matrix button{aspect-ratio:1;min-width:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;border:1px solid var(--border);border-radius:calc(var(--radius)*1.35);background:var(--secondary);color:var(--muted-foreground)}
.week-matrix button strong{font-family:var(--mono);font-size:14px;font-weight:500}
.week-matrix button span{font-size:9px}
.week-matrix button.current{border-color:var(--primary);color:var(--foreground);box-shadow:0 0 0 1px var(--primary)}
.week-matrix button.full{color:var(--primary)}
.month-chart{height:224px;display:flex;align-items:flex-end;gap:8px;overflow-x:auto}
.month-chart>div{height:100%;min-width:40px;flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.month-chart strong{font-family:var(--mono);font-size:12px}
.month-chart small{color:var(--muted-foreground);font-size:10px}
.bar-track{flex:1;width:100%;min-height:0;display:flex;align-items:flex-end;border-radius:calc(var(--radius)*.82);background:var(--secondary);overflow:hidden}
.bar-track span{display:block;width:100%;background:var(--primary)}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;height:76px;max-width:36rem;margin:0 auto;display:flex;justify-content:space-around;align-items:center;padding:0 4px;border-top:1px solid var(--border);background:rgba(6,7,9,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted-foreground);font-size:11px;padding:6px 10px}
.bottom-nav button.active{color:var(--primary)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--border);border-radius:999px;background:var(--secondary);color:var(--muted-foreground);font-size:12px;padding:6px 12px}
.chip.on{border-color:var(--primary);color:var(--foreground)}
.pill{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.04em;border:1px solid var(--border);border-radius:999px;padding:2px 8px;color:var(--muted-foreground)}
.bar{height:6px;border-radius:999px;background:var(--secondary);overflow:hidden}
.bar i{display:block;height:100%;background:var(--primary)}
.wkh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer}
.wkh .t{font-weight:600}
.wkh .p{font-size:12px;color:var(--muted-foreground);margin-top:2px}
.wkh .n{font-family:var(--mono);font-size:13px;color:var(--muted-foreground);flex:none}
.wkb{display:none;flex-direction:column;gap:10px}
.wk.open .wkb{display:flex}
.drow{border:1px solid var(--border);border-radius:14px;background:var(--background);padding:12px}
.drow .dh{display:flex;justify-content:space-between;align-items:center;gap:10px}
.dwd{font-family:var(--mono);font-size:11px;color:var(--muted-foreground);letter-spacing:.08em;text-transform:uppercase}
.dtitle{font-weight:600;margin:6px 0 4px}
.dmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.ddesc{white-space:pre-line;font-size:12.5px;line-height:1.5;color:#c7cbd1}
.chk{width:34px;height:34px;flex:none;border-radius:999px;border:1px solid var(--border);background:var(--secondary);color:transparent;font-size:16px;line-height:1}
.chk.on{background:var(--primary);border-color:var(--primary);color:var(--primary-foreground)}
.mark{width:100%;min-height:52px;border:1px solid transparent;border-radius:12px;background:var(--primary);color:var(--primary-foreground);font-size:15px;font-weight:600}
.mark.on{background:var(--secondary);color:var(--foreground);border-color:var(--primary)}
.daynav{display:flex;justify-content:space-between;gap:8px}
.daynav button{flex:1;border:1px solid var(--border);border-radius:10px;background:var(--secondary);color:var(--foreground);padding:10px;font-size:12.5px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-foreground);text-align:left;padding:6px 4px;border-bottom:1px solid var(--border)}
td{padding:7px 4px;border-bottom:1px solid var(--border)}
.mrow{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.mrow b,.mrow span:last-child{text-align:right}
.note{font-size:12px;color:var(--muted-foreground)}
</style>
</head>

<script>
const DB={"title":"План 4.1","subtitle":"Все цели + экзамен","period":"13.07.2026 – 28.02.2027","weeks":[{"n":1,"start":"13.07.2026","end":"19.07.2026","phase":"Предоперационная база","load":78,"runkm":0,"runc":0,"days":[{"wd":"Пн","date":"13.07","title":"ТЯГА + КОРПУС","desc":"РАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круговые движения в суставах; лопаточные подтягивания 2×8 (вис на турнике: руки прямые, своди лопатки вниз-назад), отдых 45 с; 2×5 лёгких подтягиваний, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (делай по порядку, отдых указан после каждого упражнения):\n1) Подтягивания 4×6 (подходы × повторы). Темп 2–1–2: 2 с вверх, 1 с пауза вверху, 2 с вниз. RIR 2–3 — заканчивай подход, когда в запасе остаётся 2–3 повтора, НЕ до отказа. Отдых 2:30.\n2) Тяга гири 24 кг в наклоне 4×10 на сторону: спина прямая, тяни гирю к поясу, 1 с фиксация вверху. Отдых 75 с между сторонами, 2 мин между подходами.\n3) Подъём коленей в висе 4×12: вис на турнике, подними колени к груди без раскачки. Отдых 75 с.\n4) Hollow hold («лодочка») 4×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"14.07","title":"АЭРОБНАЯ БАЗА","desc":"Разминка: 8 мин ходьба + 5 мин мобилизация голеностопа и бедра (медленные круговые движения, без боли).\nБег ЗАПРЕЩЁН. Основная часть: быстрая ходьба 40 мин; если колено нестабильно («шатается») — 20–30 мин спокойным шагом.\nЗаминка: 7 мин шага. Оцени боль в колене сразу после и ещё раз через 24 часа.","dur":"50–70 мин","kind":"run"},{"wd":"Ср","date":"15.07","title":"ЖИМ + СТАБИЛИЗАЦИЯ","desc":"РАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круги суставов; лопаточные подтягивания 2×8 (вис: руки прямые, своди лопатки), отдых 45 с; 2×5 лёгких повторов, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (по порядку):\n1) Брусья 4×11 (подходы × повторы). Темп 2–1–1: 2 с вниз, 1 с пауза внизу, 1 с вверх. RIR 2–3 — оставляй 2–3 повтора в запасе, не до отказа. Отдых 2:00.\n2) Жим гири 16 кг стоя 5×8 на сторону: гиря у плеча, выжми вверх до прямой руки. 75 с между сторонами, 2 мин между кругами.\n3) Отжимания от пола 3×15–25, RIR 3 (с запасом). Отдых 90 с.\n4) Боковая планка 3×40 с на сторону: упор на предплечье боком, тело — прямая линия. Отдых 45 с.\nЗАМИНКА 7 мин: 3 мин ходьба; растяжка грудных/широчайших/предплечий по 40 с ×2; 2 мин дыхание.","dur":"65–75 мин","kind":"strength"},{"wd":"Чт","date":"16.07","title":"ВОССТАНОВЛЕНИЕ","desc":"Спокойная прогулка 30–45 мин.\nЗатем 15 мин восстановления:\n1. Голеностоп к стене 2×10 на сторону: носок в 10 см от стены, тяни колено вперёд к стене, пятка на полу.\n2. Разгибание грудного отдела 2×8 (на валике или спинке стула, прогиб только в груди).\n3. Растяжка сгибателей бедра 2×40 с (выпад на колено, таз вперёд).\n4. Дыхание 5 мин: 4 с вдох / 6 с выдох.\nНикакой работы до отказа — это день отдыха.","dur":"50–60 мин","kind":"recovery"},{"wd":"Пт","date":"17.07","title":"ГИРЯ — ТЕХНИКА И ПЛОТНОСТЬ","desc":"РАЗМИНКА 12 мин: кисти, плечи, таз; махи гирей 16 кг 3×10 (гиря махом из-под таза до уровня груди, выброс тазом, а не руками), пауза 60 с.\nОСНОВНАЯ ЧАСТЬ:\n1) Рывок гири 16 кг (из замаха одним движением вверх на прямую руку): EMOM 8 мин — в начале каждой минуты новый подход: нечётная минута — 3 рывков левой, чётная — 3 правой, остаток минуты отдыхаешь. После — 3 мин отдыха.\n2) Рывок гири 24 кг: 4×3–6 на сторону, ТОЛЬКО при чистой технике. 60 с между руками, 2:30 между подходами.\n3) Перенос гири 24 кг («фермерская переноска»: ходьба с гирей в одной руке, корпус ровный) 5×40 с на сторону, отдых 60 с.\nСТОП-сигналы: гиря бьёт по предплечью или теряется фиксация вверху — заканчивай. Заминка 6 мин.","dur":"55–70 мин","kind":"strength"},{"wd":"Сб","date":"18.07","title":"ЭКЗАМЕНАЦИОННАЯ ТЕХНИКА + КСУ","desc":"1) РАЗМИНКА 15 мин: 5 мин шаг; 4 мин суставы; 4 мин беговые упражнения (высокое бедро, захлёст, подскоки); 2 свободных ускорения по 40 м — только после допуска.\n2) КСУ: 3 подходов × 2–5 чистых циклов (по экзаменационному нормативу), отдых 2:30, RIR 2 — 2 цикла в запасе.\n3) Связка спецкросса: 2–4 круга, каждый круг = 200 м лёгкого бега + 10 отжиманий + 5 прыжков в длину с места по 1,8–2,0 м; отдых 3 мин между кругами. Это отработка техники, а НЕ интервальная тренировка.\n4) Заминка 8 мин.","dur":"65–100 мин","kind":"mixed"},{"wd":"Вс","date":"19.07","title":"ПОЛНЫЙ ОТДЫХ","desc":"Без тренировки. Можно 20–30 мин спокойной прогулки.\nЧек-лист дня: сон 8–9 ч; подготовь еду на неделю; запиши утренний пульс, массу, качество сна, боль в колене и усталость.\nЕсли два показателя в жёлтой зоне — следующую неделю снизь объём на 30%.","dur":"0–30 мин","kind":"rest"}]},{"n":2,"start":"20.07.2026","end":"26.07.2026","phase":"Предоперационная база","load":90,"runkm":0,"runc":0,"days":[{"wd":"Пн","date":"20.07","title":"ТЯГА + КОРПУС","desc":"РАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круговые движения в суставах; лопаточные подтягивания 2×8 (вис на турнике: руки прямые, своди лопатки вниз-назад), отдых 45 с; 2×5 лёгких подтягиваний, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (делай по порядку, отдых указан после каждого упражнения):\n1) Подтягивания 5×7 (подходы × повторы). Темп 2–1–2: 2 с вверх, 1 с пауза вверху, 2 с вниз. RIR 2–3 — заканчивай подход, когда в запасе остаётся 2–3 повтора, НЕ до отказа. Отдых 2:30.\n2) Тяга гири 24 кг в наклоне 5×10 на сторону: спина прямая, тяни гирю к поясу, 1 с фиксация вверху. Отдых 75 с между сторонами, 2 мин между подходами.\n3) Подъём коленей в висе 4×12: вис на турнике, подними колени к груди без раскачки. Отдых 75 с.\n4) Hollow hold («лодочка») 4×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"21.07","title":"АЭРОБНАЯ БАЗА","desc":"Разминка: 8 мин ходьба + 5 мин мобилизация голеностопа и бедра (медленные круговые движения, без боли).\nБег ЗАПРЕЩЁН. Основная часть: быстрая ходьба 40 мин; если колено нестабильно («шатается») — 20–30 мин спокойным шагом.\nЗаминка: 7 мин шага. Оцени боль в колене сразу после и ещё раз через 24 часа.","dur":"50–70 мин","kind":"run"},{"wd":"Ср","date":"22.07","title":"ЖИМ + СТАБИЛИЗАЦИЯ","desc":"РАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круги суставов; лопаточные подтягивания 2×8 (вис: руки прямые, своди лопатки), отдых 45 с; 2×5 лёгких повторов, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (по порядку):\n1) Брусья 5×13 (подходы × повторы). Темп 2–1–1: 2 с вниз, 1 с пауза внизу, 1 с вверх. RIR 2–3 — оставляй 2–3 повтора в запасе, не до отказа. Отдых 2:00.\n2) Жим гири 16 кг стоя 5×8 на сторону: гиря у плеча, выжми вверх до прямой руки. 75 с между сторонами, 2 мин между кругами.\n3) Отжимания от пола 3×15–25, RIR 3 (с запасом). Отдых 90 с.\n4) Боковая планка 3×40 с на сторону: упор на предплечье боком, тело — прямая линия. Отдых 45 с.\nЗАМИНКА 7 мин: 3 мин ходьба; растяжка грудных/широчайших/предплечий по 40 с ×2; 2 мин дыхание.","dur":"65–75 мин","kind":"strength"},{"wd":"Чт","date":"23.07","title":"ВОССТАНОВЛЕНИЕ","desc":"Спокойная прогулка 30–45 мин.\nЗатем 15 мин восстановления:\n1. Голеностоп к стене 2×10 на сторону: носок в 10 см от стены, тяни колено вперёд к стене, пятка на полу.\n2. Разгибание грудного отдела 2×8 (на валике или спинке стула, прогиб только в груди).\n3. Растяжка сгибателей бедра 2×40 с (выпад на колено, таз вперёд).\n4. Дыхание 5 мин: 4 с вдох / 6 с выдох.\nНикакой работы до отказа — это день отдыха.","dur":"50–60 мин","kind":"recovery"},{"wd":"Пт","date":"24.07","title":"ГИРЯ — ТЕХНИКА И ПЛОТНОСТЬ","desc":"РАЗМИНКА 12 мин: кисти, плечи, таз; махи гирей 16 кг 3×10 (гиря махом из-под таза до уровня груди, выброс тазом, а не руками), пауза 60 с.\nОСНОВНАЯ ЧАСТЬ:\n1) Рывок гири 16 кг (из замаха одним движением вверх на прямую руку): EMOM 8 мин — в начале каждой минуты новый ×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.\nКСУ — техника: 5 подходов × 2–4 чистых цикла (цикл КСУ по твоему экзаменационному нормативу; работай на качество движения, без спешки), отдых 2 мин, RIR 3 — большой запас сил. Через 4 мин отдыха: гиря 24 кг, отработка техники 5×3 на каждую руку, 60 с между руками, 2 мин между подходами.\n⚠ Контрольные ворота недели: проверь только 2 приоритетных показателя; если есть отставание — следующие 2 недели идут как корректирующий блок вместо добавления объёма.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"29.09","title":"АЭРОБНАЯ БАЗА","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): восстановительный бег 6 км, темп 5:05–5:45/км, RPE 2–3 из 10 — совсем легко. Делай утром или минимум за 4–6 часов до мяча/гири. Никаких ускорений. Нет допуска — 35–50 мин ходьбы без боли.\n\nРазминка: 8 мин ходьба + 5 мин мобилизация голеностопа и бедра (медленные круговые движения).\nТолько после допуска врача: лёгкий бег 33 мин по ровному мягкому покрытию, темп 4:55–5:35/км, RPE 3–4 — разговорный (можешь говорить фразами). Первые 2 недели: 8×(2 мин бег / 1 мин шаг). Нет допуска — ходьба 43 мин.\nЗаминка: 7 мин шага. Оцени боль сразу и через 24 ч.\nМЯЧ 5 кг — технический контакт: разминка плеч и таза 8 мин; 4 бросков вперёд + 4 бросков через голову назад на 70–85% силы, отдых 2:30–3:00 между бросками; сними на видео 2 лучшие попытки; СТОП, если дальность упала больше чем на 7–10%.\nЗатем подтягивания EMOM 10 мин по 4–7 повторов и брусья EMOM 10 мин по 8–14 повторов. EMOM = в начале каждой минуты делаешь подход, остаток минуты отдыхаешь. RIR 3 — большой запас, не до отказа.\n⚠ Контрольные ворота недели: проверь только 2 приоритетных показателя; если есть отставание — следующие 2 недели идут как корректирующий блок вместо добавления объёма.","dur":"50–70 мин","ki иже) делай отдельно, через 4–6 часов.\n\nРАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круговые движения в суставах; лопаточные подтягивания 2×8 (вис на турнике: руки прямые, своди лопатки вниз-назад), отдых 45 с; 2×5 лёгких подтягиваний, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (делай по порядку, отдых указан после каждого упражнения):\n1) Подтягивания 4×9 (подходы × повторы). Темп 2–1–2: 2 с вверх, 1 с пауза вверху, 2 с вниз. RIR 2–3 — заканчивай подход, когда в запасе остаётся 2–3 повтора, НЕ до отказа. Отдых 2:30.\n2) Тяга гири 24 кг в наклоне 4×10 на сторону: спина прямая, тяни гирю к поясу, 1 с фиксация вверху. Отдых 75 с между сторонами, 2 мин между подходами.\n3) Подъём коленей в висе 4×12: вис на турнике, подними колени к груди без раскачки. Отдых 75 с.\n4) Hollow hold («лодочка») 4×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.\nКСУ — техника: 5 подходов × 2–4 чистых цикла (цикл КСУ по твоему экзаменационному нормативу; работай на качество движения, без спешки), отдых 2 мин, RIR 3 — большой запас сил. Через 4 мин отдыха: гиря 24 кг, отработка техники 5×3 на каждую руку, 60 с между руками, 2 мин между подходами.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"03.11","title":"АЭРОБНАЯ БАЗА","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): восстановительный бег 7 км, темп 5:05–5:45/км, RPE 2–3 из 10 — совсем легко. Делай утром или минимум за 4–6 часов до мяча/гири. Никаких ускорений. Нет допуска — 35–50 мин ходьбы без боли.\n\nРазминка: 8 мин ходьба + 5 мин мобилизация голеностопа и бедра (медленные круговые движения).\nТолько после допуска врача: лёгкий бег 37 мин по ровному мягкому покрытию, темп 4:55–5:35/км, RPE 3–4 — разговорный (можешь говорить фразами). Первые 2 недели: 8×(2 мин бег / 1 мин шаг). Нет допуска — ходьба 47 мин.\nЗаминка: 7 мин шага. Оцени боль сразу и через 24 ч.\nМЯЧ 5 кг — те х ускорения по 40 м — только после допуска.\n2) КСУ: 6 подходов × 2–5 чистых циклов (по экзаменационному нормативу), отдых 2:30, RIR 2 — 2 цикла в запасе.\n3) Связка спецкросса: 2–4 круга, каждый круг = 200 м лёгкого бега + 10 отжиманий + 5 прыжков в длину с места по 1,8–2,0 м; отдых 3 мин между кругами. Это отработка техники, а НЕ интервальная тренировка.\n4) Заминка 8 мин.\nЧЕЛНОК/СКОРОСТЬ (только после допуска), чередуй по неделям: неделя A — спринт 4×60 м, отдых 4 мин + челночный бег 4×10 м, 3 попытки, отдых 3 мин; неделя B — 3×100 м на 90–95%, отдых 5 мин + челнок 10×10 м, 2 попытки, отдых 5 мин.\nЧастичная репетиция спецкросса: 2 круга по 500 м с полным экзаменационным набором упражнений, RPE 7 из 10 (тяжело, но под контролем), отдых 6 мин между кругами.\n⚠ Контрольные ворота недели: проверь только 2 приоритетных показателя; если есть отставание — следующие 2 недели идут как корректирующий блок вместо добавления объёма.","dur":"65–100 мин","kind":"mixed"},{"wd":"Вс","date":"29.11","title":"ДЛИТЕЛЬНЫЙ БЕГ + ВОССТАНОВЛЕНИЕ","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): длительный лёгкий бег 12 км, темп 4:55–5:35/км, RPE 3–4 (разговорный); НЕ ускоряйся последние 15 мин. Лимит длительного: не больше 30% недельного объёма и не больше 16 км.\nПосле бега: 10 мин шагом, поешь в течение 60 мин, дальше свободное восстановление до конца дня.\nНет допуска — 35–50 мин ходьбы без боли. После завершения — никаких силовых, прыжков, челноков и дополнительных пробежек.\n⚠ Контрольные ворота недели: проверь только 2 приоритетных показателя; если есть отставание — следующие 2 недели идут как корректирующий блок вместо добавления объёма.","dur":"70–130 мин","kind":"run"}]},{"n":21,"start":"30.11.2026","end":"06.12.2026","phase":"Развитие","load":78,"runkm":50,"runc":5,"days":[{"wd":"Пн","date":"30.11","title":"ТЯГА + КОРПУС","desc":"БЕГОВАЯ СЕССИЯ, утро (только после двух допусков врача): лёгкий бег 11 км, темп 4:45–5:30/км, усилие RPE 3 из 10 — легко, можно свободно разговаривать. После 6 зелёных недель добавь 6 ускорений по 20 с свободным ходом, между ними 100 с шага/трусцы. Нет допуска — замени на 35–50 мин ходьбы без боли. Силовую (ниже) делай отдельно, через 4–6 часов.\n\nРАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круговые движения в суставах; лопаточные подтягивания 2×8 (вис на турнике: руки прямые, своди лопатки вниз-назад), отдых 45 с; 2×5 лёгких подтягиваний, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (делай по порядку, отдых указан после каждого упражнения):\n1) Подтягивания 4×10 (подходы × повторы). Темп 2–1–2: 2 с вверх, 1 с пауза вверху, 2 с вниз. RIR 2–3 — заканчивай подход, когда в запасе остаётся 2–3 повтора, НЕ до отказа. Отдых 2:30.\n2) Тяга гири 24 кг в наклоне 4×10 на сторону: спина прямая, тяни гирю к поясу, 1 с фиксация вверху. Отдых 75 с между сторонами, 2 мин между подходами.\n3) Подъём коленей в висе 4×12: вис на турнике, подними колени к груди без раскачки. Отдых 75 с.\n4) Hollow hold («лодочка») 4×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.\nКСУ — техника: 5 подходов × 2–4 чистых цикла (цикл КСУ по твоему экзаменационному нормативу; работай на качество движения, без спешки), отдых 2 мин, RIR 3 — большой запас сил. Через 4 мин отдыха: гиря 24 кг, отработка техники 5×3 на каждую руку, 60 с между руками, 2 мин между подходами.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"01.12","title":"АЭРОБНАЯ БАЗА","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): восстановительный бег 8 км, темп 5:05–5:45/км, RPE 2–3 из 10 — совсем легко. Делай утром или минимум за 4–6 часов до мяча/гири. Никаких ускорений. Нет допуска — 35–50 мин ходьбы без боли.\n\nРазминка: 8 мин ходьба + 5 мин мобилизация голеностопа и бедра (медленные круговые движения).\nТолько после допуска врача: лёгкий бег 41 мин по ровному мягкому покрытию, темп 4:55–5:35/км, RPE 3–4 — разговорный M 10 мин по 4–7 повторов и брусья EMOM 10 мин по 8–14 повторов. EMOM = в начале каждой минуты делаешь подход, остаток минуты отдыхаешь. RIR 3 — большой запас, не до отказа.","dur":"50–70 мин","kind":"run"},{"wd":"Ср","date":"16.12","title":"ЖИМ + СТАБИЛИЗАЦИЯ","desc":"РАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круги суставов; лопаточные подтягивания 2×8 (вис: руки прямые, своди лопатки), отдых 45 с; 2×5 лёгких повторов, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (по порядку):\n1) Брусья 5×24 (подходы × повторы). Темп 2–1–1: 2 с вниз, 1 с пауза внизу, 1 с вверх. RIR 2–3 — оставляй 2–3 повтора в запасе, не до отказа. Отдых 2:00.\n2) Жим гири 16 кг стоя 5×8 на сторону: гиря у плеча, выжми вверх до прямой руки. 75 с между сторонами, 2 мин между кругами.\n3) Отжимания от пола 3×15–25, RIR 3 (с запасом). Отдых 90 с.\n4) Боковая планка 3×40 с на сторону: упор на предплечье боком, тело — прямая линия. Отдых 45 с.\nЗАМИНКА 7 мин: 3 мин ходьба; растяжка грудных/широчайших/предплечий по 40 с ×2; 2 мин дыхание.\nСИЛОВАЯ СПЕЦИФИКА С ВЕСОМ +16 кг (гиря на поясе): после основных брусьев отдохни 5 мин, затем: подтягивания с +16 кг 4×4–8 и брусья с +16 кг 4×6–12, RIR 2 (2 повтора в запасе), отдых 3 мин между подходами. Затем КСУ 4×2–4 технических цикла, отдых 2 мин. На разгрузочной неделе: 3×4, 3×6 и 3×2.","dur":"65–75 мин","kind":"strength"},{"wd":"Чт","date":"17.12","title":"ВОССТАНОВЛЕНИЕ","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): качественный бег, всего 10 км. Порядок:\n1. 2 км легко (разминка).\n2. Беговые упражнения (drills) 5 мин: высокое бедро, захлёст голени, подскоки.\n3. Основная работа: 4×1 км по 3:28–3:35, отдых 2:30 трусца.\n4. Добегай легко до нужного объёма + 10 мин заминки шагом.\nНет допуска — 35–50 мин ходьбы без боли. Отдельную силовую делай через 4–6 часов.\n\nСпокойная прогулка 30–45 мин.\nЗатем 15 мин восстановления:\n1. Голеностоп к стене 2×10 на сторону: носок в 10 см от стены, тяни колено вперёд к стене, пятка на полу.\n2. Разгибание грудного отдела 2×8 (на валике ил рузочной неделе: 3×4, 3×6 и 3×2.","dur":"65–75 мин","kind":"strength"},{"wd":"Чт","date":"28.01","title":"ВОССТАНОВЛЕНИЕ","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): качественный бег, всего 13 км. Порядок:\n1. 2 км легко (разминка).\n2. Беговые упражнения (drills) 5 мин: высокое бедро, захлёст голени, подскоки.\n3. Основная работа: 5×1 км по 3:20–3:27, отдых 2:30–3:00 трусца.\n4. Добегай легко до нужного объёма + 10 мин заминки шагом.\nНет допуска — 35–50 мин ходьбы без боли. Отдельную силовую делай через 4–6 часов.\n\nСпокойная прогулка 30–45 мин.\nЗатем 15 мин восстановления:\n1. Голеностоп к стене 2×10 на сторону: носок в 10 см от стены, тяни колено вперёд к стене, пятка на полу.\n2. Разгибание грудного отдела 2×8 (на валике или спинке стула, прогиб только в груди).\n3. Растяжка сгибателей бедра 2×40 с (выпад на колено, таз вперёд).\n4. Дыхание 5 мин: 4 с вдох / 6 с выдох.\nНикакой работы до отказа — это день отдыха.","dur":"50–60 мин","kind":"recovery"},{"wd":"Пт","date":"29.01","title":"ГИРЯ — ТЕХНИКА И ПЛОТНОСТЬ","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): лёгкий восстановительный бег 9 км, темп 5:00–5:40/км, RPE 2–3 (совсем легко). Никаких ускорений; гирю делай через 4–6 часов. Нет допуска — 35–50 мин ходьбы без боли.\n\nРАЗМИНКА 12 мин: кисти, плечи, таз; махи гирей 16 кг 3×10 (гиря махом из-под таза до уровня груди, выброс тазом, а не руками), пауза 60 с.\nОСНОВНАЯ ЧАСТЬ:\n1) Рывок гири 16 кг (из замаха одним движением вверх на прямую руку): EMOM 20 мин — в начале каждой минуты новый подход: нечётная минута — 4 рывков левой, чётная — 4 правой, остаток минуты отдыхаешь. После — 3 мин отдыха.\n2) Рывок гири 24 кг: 4×3–6 на сторону, ТОЛЬКО при чистой технике. 60 с между руками, 2:30 между подходами.\n3) Перенос гири 24 кг («фермерская переноска»: ходьба с гирей в одной руке, корпус ровный) 5×40 с на сторону, отдых 60 с.\nСТОП-сигналы: гиря бьёт по предплечью или теряется фиксация вверху — заканчивай. Заминка 6 мин.\nВТОРОЙ КОНТАКТ ГИРИ 24 кг: одводка","load":62,"runkm":36,"runc":4,"days":[{"wd":"Пн","date":"15.02","title":"ТЯГА + КОРПУС","desc":"БЕГОВАЯ СЕССИЯ, утро (только после двух допусков врача): лёгкий бег 9 км, темп 4:45–5:30/км, усилие RPE 3 из 10 — легко, можно свободно разговаривать. После 6 зелёных недель добавь 6 ускорений по 20 с свободным ходом, между ними 100 с шага/трусцы. Нет допуска — замени на 35–50 мин ходьбы без боли. Силовую (ниже) делай отдельно, через 4–6 часов.\n\nРАЗМИНКА 10 мин: 3 мин ходьба; 2 мин круговые движения в суставах; лопаточные подтягивания 2×8 (вис на турнике: руки прямые, своди лопатки вниз-назад), отдых 45 с; 2×5 лёгких подтягиваний, отдых 60 с.\nОСНОВНАЯ ЧАСТЬ (делай по порядку, отдых указан после каждого упражнения):\n1) Подтягивания 4×10 (подходы × повторы). Темп 2–1–2: 2 с вверх, 1 с пауза вверху, 2 с вниз. RIR 2–3 — заканчивай подход, когда в запасе остаётся 2–3 повтора, НЕ до отказа. Отдых 2:30.\n2) Тяга гири 24 кг в наклоне 4×10 на сторону: спина прямая, тяни гирю к поясу, 1 с фиксация вверху. Отдых 75 с между сторонами, 2 мин между подходами.\n3) Подъём коленей в висе 4×12: вис на турнике, подними колени к груди без раскачки. Отдых 75 с.\n4) Hollow hold («лодочка») 4×30–45 с: лёжа на спине прижми поясницу к полу, приподними лопатки и прямые ноги — держи. Отдых 60 с.\nЗАМИНКА 7 мин: 3 мин спокойная ходьба; растяжка грудных, широчайших и предплечий по 40 с ×2; 2 мин спокойное дыхание.\nКСУ — техника: 5 подходов × 2–4 чистых цикла (цикл КСУ по твоему экзаменационному нормативу; работай на качество движения, без спешки), отдых 2 мин, RIR 3 — большой запас сил. Через 4 мин отдыха: гиря 24 кг, отработка техники 5×3 на каждую руку, 60 с между руками, 2 мин между подходами.\n⚠ ПОДВОДКА к экзамену: объём снижен специально; сохраняй короткую скорость и технику. Никаких добивок до отказа.","dur":"65–75 мин","kind":"strength"},{"wd":"Вт","date":"16.02","title":"АЭРОБНАЯ БАЗА","desc":"БЕГОВАЯ СЕССИЯ (только после двух допусков): восстановительный бег 6 км, темп 5:05–5:   for(const w of DB.weeks) for(let i=0;i<7;i++){
    if(dateOf(w.days[i].date).getTime()<t && !isDone(w.n,i)) c++;
  }
  return c;
}
function streak(){
  let s=0;
  for(const w of DB.weeks){
    if(weekDone(w)===7) s++; else break;
  }
  return s;
}

let TAB='overview';
let FLT='all';
let OPEN={};
OPEN[curWeekN()]=1;
let TIDX=null;
const ALL=[];
for(const w of DB.weeks) for(let i=0;i<7;i++) ALL.push([w.n,i]);
function todayIdx(){
  const p=todayPos();
  if(p) return (p[0]-1)*7+p[1];
  if(todayT()<dateOf(DB.weeks[0].days[0].date).getTime()) return 0;
  return ALL.length-1;
}

const SVGA='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">';
const I={};
I.dash=SVGA+'<rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>';
I.gauge=SVGA+'<path d="m12 14 4-4"></path><path d="M3.34 19a10 10 0 1 1 17.32 0"></path></svg>';
I.cal=SVGA+'<path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>';
I.cross=SVGA+'<circle cx="12" cy="12" r="10"></circle><line x1="22" x2="18" y1="12" y2="12"></line><line x1="6" x2="2" y1="12" y2="12"></line><line x1="12" x2="12" y1="6" y2="2"></line><line x1="12" x2="12" y1="22" y2="18"></line></svg>';
I.target=SVGA+'<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>';
I.chev=SVGA+'<path d="m6 9 6 6 6-6"></path></svg>';
I.act=SVGA+'<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"></path></svg>';
I.check=SVGA+'<path d="M20 6 9 17l-5-5"></path></svg>';
I.trend=SVGA+'<path d="M16 7h6v6"></path><path d="m22 7-8.5 8.5-5-5L2 17"></path></svg>';

function gotoTab(t){
  TAB=t;
  renderAll();
  if(window.scrollTo) window.scrollTo(0,0);
}
function openWeek(n){
  OPEN={};
  OPEN[n]=1;
  TAB='weeks';
  renderAll();
  const el=document.getElementById('wk'+n);
  if(el&&el.scrollIntoView) el.scrollIntoView();
}
function toggleWeek(n){
  if(OPEN[n]) delete OPEN[n]; else OPEN[n]=1;
  renderAll();
}
function setFlt(f){
  FLT=f;
  renderAll();
}
function shiftDay(d){
  if(d===0){ TIDX=null; }
  else {
    const cur=(TIDX===null?todayIdx():TIDX);
    TIDX=Math.max(0,Math.min(ALL.length-1,cur+d));
  }
  renderAll();
}

function renderOverview(){
  const cw=curWeekN();
  const w=DB.weeks[cw-1];
  const td=totalDone();
  const pct=Math.round(td/231*100);
  let h='<header class="overview-hero"><div><p class="eyebrow">План подготовки 4.1</p><h1>Твой прогресс</h1><p class="hero-sub">Неделя '+cw+' из 33 · '+esc(w.phase)+'</p></div><div class="progress-ring" style="--progress:'+Math.round(pct*3.6)+'deg"><strong>'+pct+'%</strong><span>выполнено</span></div></header>';
  h+='<button class="cta" onclick="gotoTab(&quot;today&quot;)"><span>Открыть тренировку на сегодня</span>'+I.chev+'</button>';
  h+='<section class="metric-grid" aria-label="Показатели прогресса">';
  h+='<article>'+I.act+'<strong>'+streak()+'</strong><span>полных недель подряд</span></article>';
  h+='<article>'+I.check+'<strong>'+td+'<small> / 231</small></strong><span>дней выполнено</span></article>';
  h+='<article>'+I.cal+'<strong>'+missedCount()+'</strong><span>прошедших не отмечено</span></article>';
  h+='<article>'+I.trend+'<strong>'+weekDone(w)+'<small> / 7</small></strong><span>текущая неделя</span></article>';
  h+='</section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Календарь цикла</p><h2>33 недели</h2></div><span>'+td+' отметок</span></div><div class="week-matrix">';
  for(const wx of DB.weeks){
    const dn=weekDone(wx);
    let cls='';
    if(wx.n===cw) cls+='current ';
    if(dn===7) cls+='full';
    h+='<button class="'+cls.trim()+'" aria-label="Неделя '+wx.n+': '+dn+' из 7 выполнено" onclick="openWeek('+wx.n+')"><strong>'+wx.n+'</strong><span>'+dn+'/7</span></button>';
  }
  h+='</div></section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Ритм работы</p><h2>Активность по месяцам</h2></div></div><div class="month-chart">';
  for(const m of DB.months){
    let tot=0,dn=0;
    for(const wx of DB.weeks) for(let i=0;i<7;i++){
      if(ymOf(wx.days[i].date)===m.ym){ tot++; if(isDone(wx.n,i)) dn++; }
    }
    const hh=Math.max(4,tot?Math.round(dn/tot*100):0);
    h+='<div><div class="bar-track"><span style="height:'+hh+'%"></span></div><strong>'+dn+'</strong><small>'+(MSHORT[m.ym.slice(5)]||m.ym)+'</small></div>';
  }
  h+='</div></section>';
  document.getElementById('tab-overview').innerHTML=h;
}

function renderToday(){
  const idx=(TIDX===null?todayIdx():TIDX);
  const p=ALL[idx];
  const w=DB.weeks[p[0]-1];
  const d=w.days[p[1]];
  const kk=KIND[d.kind]||KIND.rest;
  const dn=isDone(p[0],p[1]);
  const tp=todayPos();
  const isToday=!!(tp&&tp[0]===p[0]&&tp[1]===p[1]);
  let h='';
  if(!tp&&TIDX===null&&todayT()<dateOf(DB.weeks[0].days[0].date).getTime()){
    h+='<div class="note">План начинается 13.07.2026 — показан первый день.</div>';
  }
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">'+(isToday?'Сегодня':'Тренировка')+'</p><h2>'+d.wd+' '+d.date+' — '+esc(d.title)+'</h2></div><span>Неделя '+p[0]+'/33</span></div>';
  h+='<div class="dmeta"><span class="pill" style="color:'+kk[2]+';border-color:'+kk[2]+'">'+kk[0]+' '+kk[1]+'</span><span class="pill">⏱ '+esc(d.dur)+'</span><span class="pill">нагрузка '+w.load+'%</span></div>';
  h+='<div class="ddesc">'+esc(d.desc)+'</div>';
  h+='<button class="mark'+(dn?' on':'')+'" onclick="toggle('+p[0]+','+p[1]+')">'+(dn?'✓ Выполнено':'Отметить выполненной')+'</button></section>';
  h+='<div class="daynav"><button onclick="shiftDay(-1)">← Предыдущий</button><button onclick="shiftDay(0)">Сегодня</button><button onclick="shiftDay(1)">Следующий →</button></div>';
  h+='<div class="note">⚠️ При шаткости колена бег, спринты, прыжки и тесты запрещены до ортопеда. После операции сроки возврата назначает хирург. Календарь сдвигается вслед за реальной датой допуска.</div>';
  document.getElementById('tab-today').innerHTML=h;
}

function passFlt(d){
  if(FLT==='all') return true;
  if(FLT==='run') return d.kind==='run'||d.kind==='mixed';
  if(FLT==='str') return d.kind==='strength'||d.kind==='mixed';
  return d.kind==='recovery'||d.kind==='rest'||d.kind==='med';
}
function dayRow(w,i){
  const d=w.days[i];
  const kk=KIND[d.kind]||KIND.rest;
  const dn=isDone(w.n,i);
  let h='<div class="drow"><div class="dh"><span class="dwd">'+d.wd+' · '+d.date+'</span><button class="chk'+(dn?' on':'')+'" onclick="toggle('+w.n+','+i+',event)" aria-label="Отметить">'+(dn?'✓':'')+'</button></div>';
  h+='<div class="dtitle">'+kk[0]+' '+esc(d.title)+'</div>';
  h+='<div class="dmeta"><span class="pill" style="color:'+kk[2]+';border-color:'+kk[2]+'">'+kk[1]+'</span><span class="pill">⏱ '+esc(d.dur)+'</span></div>';
  h+='<div class="ddesc">'+esc(d.desc)+'</div></div>';
  return h;
}
function renderWeeks(){
  const cw=curWeekN();
  const chips=[['all','Все'],['run','🏃 Бег'],['str','💪 Силовая'],['rec','🧘 Отдых/восст.']];
  let h='<div class="chips">';
  for(const c of chips) h+='<button class="chip'+(FLT===c[0]?' on':'')+'" onclick="setFlt(&quot;'+c[0]+'&quot;)">'+c[1]+'</button>';
  h+='</div>';
  for(const w of DB.weeks){
    const dn=weekDone(w);
    const cur=w.n===cw;
    let days='';
    for(let i=0;i<7;i++) if(passFlt(w.days[i])) days+=dayRow(w,i);
    if(!days) days='<div class="note">Нет дней этого типа</div>';
    h+='<section class="dashboard-card wk'+(OPEN[w.n]?' open':'')+'" id="wk'+w.n+'">';
    h+='<div class="wkh" onclick="toggleWeek('+w.n+')"><div><div class="t">Неделя '+w.n+' · '+w.start.slice(0,5)+'–'+w.end.slice(0,5)+(cur?' · сейчас':'')+'</div>';
    h+='<div class="p">'+esc(w.phase)+' · нагрузка '+w.load+'%'+(w.runkm?' · 🏃 '+w.runkm+' км ('+w.runc+' контакта)':'')+'</div></div>';
    h+='<div class="n">'+dn+'/7</div></div>';
    h+='<div class="bar"><i style="width:'+Math.round(dn/7*100)+'%"></i></div>';
    h+='<div class="wkb">'+days+'</div></section>';
  }
  document.getElementById('tab-weeks').innerHTML=h;
}

function renderMonths(){
  let h='';
  for(const m of DB.months){
    let tot=0,dn=0;
    for(const w of DB.weeks) for(let i=0;i<7;i++){
      if(ymOf(w.days[i].date)===m.ym){ tot++; if(isDone(w.n,i)) dn++; }
    }
    const rows=[['Масса, кг',m.mass],['5 км',m.k5],['3 км',m.k3],['100 м',m.m100],['Подтягивания',m.pull],['Брусья',m.dips],['КСУ',m.ksu],['Рывок 24 кг/10 мин',m.giri]];
    let rh='';
    for(const r of rows) rh+='<div class="mrow"><span>'+r[0]+'</span><b>'+esc(r[1])+'</b></div>';
    let mx='';
    if(m.ym==='2027-02'){
      const f=DB.febmax;
      mx='<div class="note" style="font-weight:700">Максимум (идеальный сценарий):</div>';
      mx+='<div class="mrow"><span>5 км</span><b>'+f.k5+'</b></div><div class="mrow"><span>3 км</span><b>'+f.k3+'</b></div>';
      mx+='<div class="mrow"><span>Подтягивания</span><b>'+f.pull+'</b></div><div class="mrow"><span>Брусья</span><b>'+f.dips+'</b></div>';
      mx+='<div class="mrow"><span>КСУ</span><b>'+f.ksu+'</b></div><div class="mrow"><span>Рывок 24 кг</span><b>'+f.giri+'</b></div>';
    }
    h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Месяц</p><h2>'+m.name+'</h2></div><span>'+dn+'/'+tot+' трен.</span></div>';
    h+='<div class="bar"><i style="width:'+(tot?Math.round(dn/tot*100):0)+'%"></i></div>'+rh+mx+'</section>';
  }
  h+='<div class="note">* — показатель проверяется только при медицинском допуске, без боли и шаткости.</div>';
  document.getElementById('tab-months').innerHTML=h;
}

function renderGoals(){
  let rows='';
  for(const g of DB.goals) rows+='<tr><td>'+g[0]+'</td><td>'+g[1]+'</td><td>'+g[2]+'</td><td><b>'+g[3]+'</b></td><td>'+g[4]+'</td></tr>';
  let eh='';
  for(const e of DB.exam) eh+='<div class="mrow"><span style="flex:none;font-weight:700">'+e[0]+'</span><span>'+esc(e[1])+'</span></div>';
  let gh='';
  for(const g2 of DB.gates) gh+='<div class="mrow"><span style="flex:none;font-weight:700">'+g2[0]+'</span><span>'+esc(g2[1])+'</span></div>';
  let rh='';
  for(const r of DB.rules) rh+='<div class="mrow"><span style="flex:none;font-weight:700">'+r[0]+'</span><span>'+esc(r[1])+'</span></div>';
  let h='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Цели</p><h2>Февраль 2027</h2></div></div><table><tr><th>Показатель</th><th>Старт</th><th>Мин</th><th>Реал.</th><th>Макс</th></tr>'+rows+'</table></section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Экзамен</p><h2>Целевые блоки (февраль 2027)</h2></div></div>'+eh+'</section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Контроль</p><h2>Контрольные ворота</h2></div></div>'+gh+'</section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Правила</p><h2>Единые правила</h2></div></div>'+rh+'</section>';
  h+='<section class="dashboard-card"><div class="dashboard-heading"><div><p class="eyebrow">Допуск</p><h2>Критерий допуска к бегу</h2></div></div><div class="note">Заключение ортопеда; отсутствие подкашивания; ходьба 45 мин без боли; 10 контролируемых приседаний на одной ноге; 20 подъёмов на носок; 10 лёгких прыжков на месте без боли и реакции через 24 ч — только если врач разрешил. Затем 2 недели walk-run.</div></section>';
  document.getElementById('tab-goals').innerHTML=h;
}

function renderNav(){
  const tabs=[['overview','Обзор',I.dash],['today','Сегодня',I.gauge],['weeks','Недели',I.cal],['months','Месяцы',I.cross],['goals','Цели',I.target]];
  let h='';
  for(const t of tabs){
    h+='<button class="'+(TAB===t[0]?'active':'')+'"'+(TAB===t[0]?' aria-current="page"':'')+' onclick="gotoTab(&quot;'+t[0]+'&quot;)">'+t[2]+'<span>'+t[1]+'</span></button>';
  }
  document.getElementById('nav').innerHTML=h;
}

function renderAll(){
  renderOverview();
  renderToday();
  renderWeeks();
  renderMonths();
  renderGoals();
  renderNav();
  for(const t of ['overview','today','weeks','months','goals']){
    const el=document.getElementById('tab-'+t);
    if(el&&el.classList) el.classList.toggle('on',TAB===t);
  }
}
renderAll();
</script>
</body>
</html>
